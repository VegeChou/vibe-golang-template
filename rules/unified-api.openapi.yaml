openapi: 3.0.3
info:
  title: Unified API Rules
  version: 1.0.0
  description: |
    Unified API specification for Java, Python, Node.js, Golang backends and React frontend.
    This file is intended to be machine-readable by LLM and tooling.

servers:
  - url: https://api.example.com

tags:
  - name: Rules
    description: Global API behavior contract

paths:
  /_rules/health:
    get:
      tags: [Rules]
      summary: Example endpoint using unified response envelope
      operationId: rulesHealth
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/LangQuery"
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Health"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

components:
  parameters:
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      description: Client-provided trace id. Server should generate one if missing.
      required: false
      schema:
        type: string
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      description: Preferred response language. Supported values: zh-CN, en-US.
      required: false
      schema:
        type: string
        example: zh-CN
    LangQuery:
      name: lang
      in: query
      required: false
      description: Fallback language selector when header is unavailable.
      schema:
        $ref: "#/components/schemas/LanguageCode"
    Page:
      name: page
      in: query
      required: false
      description: 1-based page number
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: false
      description: Page size (max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor from previous page
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Cursor page size (max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token authentication. Prefer this as default.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Service-to-service or automation API key authentication.

  schemas:
    LanguageCode:
      type: string
      description: Supported language code.
      enum:
        - zh-CN
        - en-US

    ErrorCode:
      type: string
      description: Business error code. Use DOMAIN_SCENARIO naming.
      enum:
        - OK
        - COMMON_INVALID_PARAM
        - AUTH_UNAUTHORIZED
        - AUTH_FORBIDDEN
        - COMMON_NOT_FOUND
        - COMMON_CONFLICT
        - COMMON_TOO_MANY_REQUESTS
        - SYSTEM_DEPENDENCY_ERROR
        - SYSTEM_INTERNAL_ERROR

    ApiResponseMeta:
      type: object
      required: [traceId, timestamp]
      properties:
        traceId:
          type: string
          description: Trace identifier for diagnostics
        timestamp:
          type: string
          format: date-time
          description: Server timestamp in UTC ISO-8601

    ApiResponse:
      type: object
      required: [success, code, message, data, traceId, timestamp, lang]
      properties:
        success:
          type: boolean
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          description: User-facing message in selected language, without stack trace
        lang:
          $ref: "#/components/schemas/LanguageCode"
        data:
          nullable: true
          description: Business payload. Null on error.
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          required: [success, code, message, data]
          properties:
            success:
              type: boolean
              enum: [false]
            code:
              description: Must not be OK
              allOf:
                - $ref: "#/components/schemas/ErrorCode"
            data:
              type: "null"

    PageResult:
      type: object
      required: [items, page, size, total, totalPages, hasNext]
      properties:
        items:
          type: array
          items: {}
          description: Empty list when no records
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean

    CursorResult:
      type: object
      required: [items, hasNext]
      properties:
        items:
          type: array
          items: {}
        nextCursor:
          type: string
          nullable: true
          description: Null when hasNext is false
        hasNext:
          type: boolean

    HealthPayload:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP]

    ApiResponse_Health:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            success:
              type: boolean
              enum: [true]
            code:
              type: string
              enum: [OK]
            message:
              type: string
              example: success
            lang:
              $ref: "#/components/schemas/LanguageCode"
            data:
              $ref: "#/components/schemas/HealthPayload"

  responses:
    BadRequest:
      description: Invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            invalidParam:
              value:
                success: false
                code: COMMON_INVALID_PARAM
                message: 请求参数不合法
                lang: zh-CN
                data: null
                traceId: fc5d3c6d3cfa45a39d68fd83f4e54a2f
                timestamp: "2026-03-03T15:04:05Z"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    TooManyRequests:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    InternalServerError:
      description: Unexpected internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"

x-rules:
  apiDesign:
    pathNaming:
      rules:
        - use lowercase kebab-case for path segments
        - use plural nouns for resource collections
        - avoid verbs in path; use HTTP methods for action semantics
        - allow verb-like sub-resources only for non-CRUD domain actions
      examples:
        good:
          - /v1/users
          - /v1/orders/{orderId}/items
        conditional:
          - /v1/orders/{orderId}/cancel
        bad:
          - /v1/getUsers
          - /v1/createOrder
    fieldNaming:
      requestAndResponse: camelCase
      enums: UPPER_SNAKE_CASE
      booleans: prefix with is/has/can when semantically boolean
      datetimeFormat: RFC3339 (ISO-8601) in UTC
      nullability:
        - do not return null for arrays; return []
        - do not return null for objects when empty object semantics are required
    operationConventions:
      - each operation must define summary and description
      - each operation should provide success and error examples
      - use operationId in lowerCamelCase and keep globally unique
    queryConventions:
      filters: use explicit filter keys; avoid free-form query DSL
      sorting:
        fields:
          - sortBy
          - sortOrder
        sortOrderEnum: [asc, desc]
        rule: enforce stable sort by appending primary key as tie-breaker
  i18n:
    supportedLanguages: [zh-CN, en-US]
    priority:
      - Accept-Language header
      - lang query parameter
      - service default (en-US)
    behavior:
      - return message in selected language only
      - include lang in every response
      - fallback to default language when unsupported value is provided
  pagination:
    page:
      request: [page, size]
      defaults:
        page: 1
        size: 20
      maxSize: 100
      behavior:
        - return empty items when page exceeds range
        - never return null for items
        - enforce stable sort order
    cursor:
      request: [cursor, limit]
      defaults:
        limit: 20
      maxLimit: 100
  exceptionHandling:
    backend:
      - use global exception handler/middleware/filter
      - map exceptions to ApiErrorResponse
      - never expose stack trace to clients in production
      - log traceId, method, path, code, stack
    frontend:
      - handle non-2xx as transport/gateway errors
      - handle 2xx + success=false as business errors
      - redirect on 401
      - show no-permission page on 403
      - include traceId in error reporting
  languageImplementations:
    java: "Spring Boot with @RestControllerAdvice and @ExceptionHandler"
    python: "FastAPI/Flask global exception handlers"
    node: "Express error middleware or NestJS exception filters"
    golang: "Recover middleware + unified error response writer"
  httpStatusPolicy:
    "2xx": request accepted and processed successfully
    "4xx": client-side issues (validation/auth/authorization/not found/conflict/rate limit)
    "5xx": server-side or dependency failures
    baselineMapping:
      COMMON_INVALID_PARAM: 400
      AUTH_UNAUTHORIZED: 401
      AUTH_FORBIDDEN: 403
      COMMON_NOT_FOUND: 404
      COMMON_CONFLICT: 409
      COMMON_TOO_MANY_REQUESTS: 429
      SYSTEM_DEPENDENCY_ERROR: 502
      SYSTEM_INTERNAL_ERROR: 500
    rule:
      - always return business code with HTTP status
      - frontend business branching should primarily use code
  documentation:
    sourceOfTruth:
      machine: rules/unified-api.openapi.yaml
      humanGenerated: rules/unified-api.human.md
    updatePolicy:
      - on any API contract change, update OpenAPI first
      - run scripts/sync-api-docs.sh to regenerate human-readable doc
      - commit both files in same PR
    generation:
      tools:
        - Swagger UI
        - Redoc
      requirement:
        - every operation must include description
        - every operation must include at least one success example and one error example
  testing:
    unitTest:
      - each endpoint must have unit tests validating input and response envelope
      - include positive and negative cases
    contractTest:
      - validate response schema against OpenAPI
      - fail CI on contract drift
    integrationTest:
      - verify upstream/downstream service collaboration
      - verify auth, permission, and idempotency behaviors
    coverage:
      minimumLineCoverage: 80
      scope: changed modules should not decrease overall coverage
  versioning:
    pathVersioning:
      enabled: true
      pattern: /v{major}
      example: /v1/users
    compatibility:
      - non-breaking changes are additive only
      - breaking changes require new major version
    deprecation:
      requiredFields:
        - x-deprecated
        - x-sunset-date
      policy:
        - announce deprecation before removal
        - provide migration path in changelog
  security:
    transport:
      - HTTPS is mandatory in all non-local environments
      - reject plain HTTP at gateway/load balancer
    authentication:
      preferred: bearerAuth
      optionalAlternatives:
        - apiKeyAuth
    authorization:
      model: RBAC
      rule:
        - enforce least privilege
        - return 401 for unauthenticated and 403 for unauthorized
    dataProtection:
      inTransit: TLS 1.2+
      atRest: encryption required for sensitive data
      secrets:
        - do not hardcode secrets in source code
        - rotate keys/tokens regularly
  observability:
    requestLogging:
      requiredFields:
        - timestamp
        - method
        - path
        - status
        - traceId
        - userId
        - latencyMs
    errorLogging:
      requiredFields:
        - traceId
        - code
        - errorClass
        - message
        - stack
      rule:
        - redact sensitive fields
    monitoring:
      recommendedStack:
        - Prometheus
        - Grafana
      coreMetrics:
        - request_rate
        - error_rate
        - p95_latency
        - p99_latency
      alerts:
        - sustained_5xx_spike
        - latency_slo_breach
  developerGuide:
    quickStart:
      - obtain access token (JWT/API key based on environment)
      - call endpoint with Accept-Language and optional X-Trace-Id
      - parse unified response envelope fields first (success/code/message/lang)
    errorHandling:
      - use code for business decisions
      - use traceId when escalating to backend support
    paginationAndSorting:
      pageMode:
        request: [page, size, sortBy, sortOrder]
      cursorMode:
        request: [cursor, limit]
      response:
        - PageResult for page mode
        - CursorResult for cursor mode
  llmCodingConstraints:
    - do not invent response envelope fields outside ApiResponse unless contract explicitly extends it
    - always use page/size for page pagination and cursor/limit for cursor pagination
    - only use registered ErrorCode values
    - generate global exception handling and i18n handling in server templates
    - generate API examples in both en-US and zh-CN where user-facing messages are present
